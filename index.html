<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>

<style>
    .container {
        width: 300px;
        margin: 50px auto;
        padding: 20px;
        border: 1px solid #ccc;
        border-radius: 5px;
        align-items: center;
        justify-content: center;
    }
    label {
        display: block;
        margin-top: 10px;
        margin-bottom: -40px;
        font-weight: bold;
    }
    input {
        display: block;
        margin-top: 20px;
        margin-bottom: 10px;
        border: none;
        border-bottom: 1px solid #ccc;
        padding: 5px;

    }
    input:focus {
        outline: none;
        border-bottom: 1px solid #007BFF;
    }
    input:focus + label {
        margin-top: 10px;
        font-size: 5px;
        color: #007BFF;
    }

</style>

</head>
<body>
    <div class="container">
        <label for="name">Name:</label>
        <input type="text" id="name">

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf">
    </div>
</body>
</html>

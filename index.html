<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .container {
            width: 300px;
            margin-top: 15px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 30px;
        }

        label {
            position: absolute;
            left: 5px;
            top: 5px;
            color: #999;
            font-weight: bold;
            pointer-events: none;
            transition: 0.2s ease all;
        }

        input {
            width: 100%;
            padding: 5px;
            border: none;
            border-bottom: 1px solid #ccc;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-bottom: 1px solid #007BFF;
        }

        input:focus ~ label,
        input:not(:placeholder-shown) ~ label {
            top: -20px;
            left: 0;
            font-size: 12px;
            color: #007BFF;
        }


        input::placeholder {
            color: transparent;
        }

        h3 {
            text-align: center;
            margin-top: 20px;
        }
    </style>

</head>
<body>
    <div class="container">
        <div class="input-group">
            <input type="text" id="name" placeholder=" ">
            <label for="name">Nome:</label>
        </div>

        <div class="input-group">
            <input type="text" id="cpf" placeholder=" ">
            <label for="cpf">CPF:</label>
        </div>

        <h3>texto</h3>
    </div>
</body>
</html>
